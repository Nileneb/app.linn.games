name: Deploy to Production

on:
  workflow_run:
    workflows: ["tests"]
    branches: [main]
    types: [completed]
  workflow_dispatch:  # manueller Trigger via `gh workflow run 'Deploy to Production'`

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, u-server]
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Write .env from GitHub Environment
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REVERB_APP_SECRET: ${{ secrets.REVERB_APP_SECRET }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          MAYRING_MCP_AUTH_TOKEN: ${{ secrets.MAYRING_MCP_AUTH_TOKEN }}
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
          JWT_TTL_SECONDS: ${{ vars.JWT_TTL_SECONDS }}
          JWT_REFRESH_GRACE_SECONDS: ${{ vars.JWT_REFRESH_GRACE_SECONDS }}
          PAPER_SEARCH_TOKEN: ${{ secrets.PAPER_SEARCH_TOKEN }}
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          LANGDOCK_DB_USERNAME: ${{ secrets.LANGDOCK_DB_USERNAME }}
          LANGDOCK_DB_PASSWORD: ${{ secrets.LANGDOCK_DB_PASSWORD }}
          APP_NAME: ${{ vars.APP_NAME }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          APP_ENV: ${{ vars.APP_ENV }}
          APP_URL: ${{ vars.APP_URL }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          APP_LOCALE: ${{ vars.APP_LOCALE }}
          APP_FALLBACK_LOCALE: ${{ vars.APP_FALLBACK_LOCALE }}
          APP_FAKER_LOCALE: ${{ vars.APP_FAKER_LOCALE }}
          APP_MAINTENANCE_DRIVER: ${{ vars.APP_MAINTENANCE_DRIVER }}
          BCRYPT_ROUNDS: ${{ vars.BCRYPT_ROUNDS }}
          LOG_CHANNEL: ${{ vars.LOG_CHANNEL }}
          LOG_STACK: ${{ vars.LOG_STACK }}
          LOG_DEPRECATIONS_CHANNEL: ${{ vars.LOG_DEPRECATIONS_CHANNEL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          DB_CONNECTION: ${{ vars.DB_CONNECTION }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_DATABASE: ${{ vars.DB_DATABASE }}
          DB_USERNAME: ${{ vars.DB_USERNAME }}
          POSTGRES_DATABASE: ${{ vars.POSTGRES_DATABASE }}
          POSTGRES_USERNAME: ${{ vars.POSTGRES_USERNAME }}
          SESSION_DRIVER: ${{ vars.SESSION_DRIVER }}
          SESSION_LIFETIME: ${{ vars.SESSION_LIFETIME }}
          SESSION_ENCRYPT: ${{ vars.SESSION_ENCRYPT }}
          SESSION_PATH: ${{ vars.SESSION_PATH }}
          SESSION_DOMAIN: ${{ vars.SESSION_DOMAIN }}
          BROADCAST_CONNECTION: ${{ vars.BROADCAST_CONNECTION }}
          FILESYSTEM_DISK: ${{ vars.FILESYSTEM_DISK }}
          QUEUE_CONNECTION: ${{ vars.QUEUE_CONNECTION }}
          CACHE_STORE: ${{ vars.CACHE_STORE }}
          REDIS_CLIENT: ${{ vars.REDIS_CLIENT }}
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          REDIS_PASSWORD: ${{ vars.REDIS_PASSWORD }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          REVERB_APP_ID: ${{ vars.REVERB_APP_ID }}
          REVERB_APP_KEY: ${{ vars.REVERB_APP_KEY }}
          REVERB_HOST: ${{ vars.REVERB_HOST }}
          REVERB_PORT: ${{ vars.REVERB_PORT }}
          REVERB_SCHEME: ${{ vars.REVERB_SCHEME }}
          VITE_REVERB_APP_KEY: ${{ vars.VITE_REVERB_APP_KEY }}
          VITE_REVERB_HOST: ${{ vars.VITE_REVERB_HOST }}
          VITE_REVERB_PORT: ${{ vars.VITE_REVERB_PORT }}
          VITE_REVERB_SCHEME: ${{ vars.VITE_REVERB_SCHEME }}
          MAIL_MAILER: ${{ vars.MAIL_MAILER }}
          MAIL_SCHEME: ${{ vars.MAIL_SCHEME }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_USERNAME: ${{ vars.MAIL_USERNAME }}
          MAIL_FROM_ADDRESS: ${{ vars.MAIL_FROM_ADDRESS }}
          MEMCACHED_HOST: ${{ vars.MEMCACHED_HOST }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_USE_PATH_STYLE_ENDPOINT: ${{ vars.AWS_USE_PATH_STYLE_ENDPOINT }}
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          CLAUDE_USE_DIRECT_API: ${{ vars.CLAUDE_USE_DIRECT_API }}
          CLAUDE_USE_OLLAMA_WORKERS: ${{ vars.CLAUDE_USE_OLLAMA_WORKERS }}
          MAYRING_MCP_ENDPOINT: ${{ vars.MAYRING_MCP_ENDPOINT }}
          MAYRING_OLLAMA_MODEL: ${{ vars.MAYRING_OLLAMA_MODEL }}
          PI_AGENT_URL: ${{ vars.PI_AGENT_URL }}
          PAPER_SEARCH_URL: ${{ vars.PAPER_SEARCH_URL }}
          STRIPE_MAYRING_PRICE_ID: ${{ vars.STRIPE_MAYRING_PRICE_ID }}
          MCP_RESTRICT_TO_INTERNAL: ${{ vars.MCP_RESTRICT_TO_INTERNAL }}
        run: |
          cd ~/app.linn.games
          python3 scripts/write-env.py

      - name: Free disk space (Docker cleanup)
        run: |
          AVAIL=$(df / --output=avail | tail -1)
          if [ "$AVAIL" -lt 10485760 ]; then
            echo "Less than 10 GB free ($((AVAIL/1024/1024)) GB) — pruning Docker..."
            docker image prune -af --filter "until=24h" 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
          else
            echo "Disk OK: $((AVAIL/1024/1024)) GB free"
          fi

      - name: Pull latest code
        run: |
          cd ~/app.linn.games
          git fetch origin main
          git reset --hard origin/main

      - name: Run full deploy
        id: deploy
        timeout-minutes: 60
        run: |
          cd ~/app.linn.games
          ./deploy.sh 2>&1 | tee /tmp/deploy-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Verify app health
        run: |
          for i in $(seq 1 6); do
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:6481 2>/dev/null); STATUS=${STATUS:-000}
            echo "Attempt $i/6: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Health check passed."
              exit 0
            fi
          done
          echo "Health check failed after 30s (last: HTTP $STATUS)" >&2
          exit 1

  open-issue-on-failure:
    name: Report failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Get failed workflow run URL
        id: run_url
        run: |
          echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Create issue on deploy failure
        uses: actions/github-script@v9
        with:
          script: |
            const title = `🚨 Deploy fehlgeschlagen — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              '## Deploy-Fehler auf Production',
              '',
              `**Commit:** [\`${{ github.event.workflow_run.head_sha }}\`](${{ github.event.workflow_run.html_url }})`,
              `**Branch:** \`${{ github.event.workflow_run.head_branch }}\``,
              `**Run:** ${{ steps.run_url.outputs.url }}`,
              '',
              '## Schritte zur Behebung',
              '1. Deploy-Log im GitHub-Run öffnen (Link oben)',
              '2. SSH: `ssh nileneb@u-server`',
              '3. `cd ~/app.linn.games && docker compose logs php-fpm --tail=50`',
              '4. Nach Fix: `./deploy.sh` (deploy immer komplett)',
              '',
              '_Automatisch erstellt von GitHub Actions_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'deploy-failure'],
            });

  open-issue-on-test-failure:
    name: Report test failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      issues: write

    steps:
      - name: Create issue on test failure
        uses: actions/github-script@v9
        with:
          script: |
            const title = `🔴 Tests fehlgeschlagen — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              '## Tests fehlgeschlagen — kein Deploy durchgeführt',
              '',
              `**Commit:** [\`${{ github.event.workflow_run.head_sha }}\`](${{ github.event.workflow_run.html_url }})`,
              `**Branch:** \`${{ github.event.workflow_run.head_branch }}\``,
              `**Test-Run:** ${{ github.event.workflow_run.html_url }}`,
              '',
              '## Was tun',
              '1. Test-Log öffnen: [Details](${{ github.event.workflow_run.html_url }})',
              '2. Failing tests lokal reproduzieren:',
              '   ```bash',
              '   docker compose run --rm php-test vendor/bin/pest --no-coverage',
              '   ```',
              '3. Fix pushen → Deploy läuft automatisch nach grünen Tests',
              '',
              '_Automatisch erstellt von GitHub Actions_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'test-failure'],
            });
