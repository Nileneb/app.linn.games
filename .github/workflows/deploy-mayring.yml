name: Deploy MayringCoder

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.mayring.yml'
      - 'docker/mayring/**'
  repository_dispatch:
    types: [mayring-deploy]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest)"
        default: "latest"

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    name: Deploy on u-server
    runs-on: [self-hosted, u-server]
    environment: production
    env:
      DEPLOY_TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag || 'latest' }}

    steps:
      - name: Write Laravel .env from GitHub Environment
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REVERB_APP_SECRET: ${{ secrets.REVERB_APP_SECRET }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
          MAYRING_MCP_AUTH_TOKEN: ${{ secrets.MAYRING_MCP_AUTH_TOKEN }}
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          PAPER_SEARCH_TOKEN: ${{ secrets.PAPER_SEARCH_TOKEN }}
          STRIPE_KEY: ${{ secrets.STRIPE_KEY }}
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_ENV: ${{ vars.APP_ENV }}
          APP_URL: ${{ vars.APP_URL }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_DATABASE: ${{ vars.DB_DATABASE }}
          DB_USERNAME: ${{ vars.DB_USERNAME }}
          POSTGRES_DATABASE: ${{ vars.POSTGRES_DATABASE }}
          POSTGRES_USERNAME: ${{ vars.POSTGRES_USERNAME }}
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          MAYRING_MCP_ENDPOINT: ${{ vars.MAYRING_MCP_ENDPOINT }}
          MAYRING_OLLAMA_MODEL: ${{ vars.MAYRING_OLLAMA_MODEL }}
          PI_AGENT_URL: ${{ vars.PI_AGENT_URL }}
          MAYRING_UI_AUTH_PASS: ${{ secrets.MAYRING_UI_AUTH_PASS }}
          MAYRING_UI_AUTH_USER: ${{ vars.MAYRING_UI_AUTH_USER }}
          MAYRING_PORT: ${{ vars.MAYRING_PORT }}
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
          JWT_TTL_SECONDS: ${{ vars.JWT_TTL_SECONDS }}
          JWT_REFRESH_GRACE_SECONDS: ${{ vars.JWT_REFRESH_GRACE_SECONDS }}
        run: |
          cd ~/app.linn.games
          python3 scripts/write-env.py

      - name: Write MayringCoder .env.production
        env:
          OLLAMA_URL: ${{ vars.OLLAMA_URL }}
          OLLAMA_MODEL: ${{ vars.MAYRING_OLLAMA_MODEL }}
          PI_REPO_SLUG: ${{ vars.PI_REPO_SLUG }}
          MCP_AUTH_ENABLED: "true"
          JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
          JWT_ISSUER: ${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ vars.JWT_AUDIENCE }}
          APP_BASE_URL: ${{ vars.MAYRING_APP_BASE_URL }}
          MAYRING_API_URL: http://mayring-api:8090
          LARAVEL_NETWORK: linn-shared
          MAYRING_PORT: ${{ vars.MAYRING_PORT }}
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
          # Server-side watcher: path to ~/.claude/projects on the runner host.
          # Set as GitHub Actions variable CLAUDE_PROJECTS_DIR (e.g. /home/nileneb/.claude/projects).
          # Leave empty to skip the watcher profile.
          CLAUDE_PROJECTS_DIR: ${{ vars.CLAUDE_PROJECTS_DIR }}
        run: |
          cat > ~/app.linn.games/.env.production << ENVEOF
          OLLAMA_URL=${OLLAMA_URL}
          OLLAMA_MODEL=${OLLAMA_MODEL}
          PI_REPO_SLUG=${PI_REPO_SLUG}
          MCP_AUTH_ENABLED=${MCP_AUTH_ENABLED}
          JWT_PUBLIC_KEY_PATH=${JWT_PUBLIC_KEY_PATH}
          JWT_ISSUER=${JWT_ISSUER}
          JWT_AUDIENCE=${JWT_AUDIENCE}
          APP_BASE_URL=${APP_BASE_URL}
          MAYRING_API_URL=${MAYRING_API_URL}
          LARAVEL_NETWORK=${LARAVEL_NETWORK}
          MAYRING_PORT=${MAYRING_PORT}
          MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN}
          CLAUDE_PROJECTS_DIR=${CLAUDE_PROJECTS_DIR}
          ENVEOF

      - name: Write JWT public key for MayringCoder
        env:
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        run: |
          mkdir -p ~/app.linn.games/secrets
          printf '%s' "$JWT_PUBLIC_KEY" > ~/app.linn.games/secrets/jwt_public.pem
          chmod 600 ~/app.linn.games/secrets/jwt_public.pem

      - name: Pull latest code
        run: |
          cd ~/app.linn.games
          git fetch origin main
          git reset --hard origin/main

      - name: Deploy MayringCoder stack
        timeout-minutes: 10
        env:
          CLAUDE_PROJECTS_DIR: ${{ vars.CLAUDE_PROJECTS_DIR }}
        run: |
          cd ~/app.linn.games
          DEPLOY_TAG="$DEPLOY_TAG" ./deploy-mayring.sh 2>&1 | tee /tmp/mayring-deploy-output.txt

  open-issue-on-failure:
    name: Report failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create issue on deploy failure
        uses: actions/github-script@v9
        with:
          script: |
            const title = `🚨 MayringCoder Deploy fehlgeschlagen — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              '## MayringCoder Deploy-Fehler auf Production',
              '',
              `**Commit:** [\`${{ github.sha }}\`](${{ github.event.head_commit.url }})`,
              `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '## Schritte zur Behebung',
              '1. SSH: `ssh nileneb@u-server`',
              '2. `cd ~/app.linn.games && docker compose -f docker-compose.mayring.yml logs --tail=50`',
              '3. Nach Fix: `./deploy-mayring.sh`',
              '',
              '_Automatisch erstellt von GitHub Actions_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'deploy-failure'],
            });
