name: Deploy MayringCoder

on:
  push:
    branches: [main]
    paths:
      - 'MayringCoder/**'
      - 'docker-compose.mayring.yml'
      - 'docker/mayring/**'

permissions:
  contents: read
  packages: write
  issues: write

env:
  IMAGE: ghcr.io/nileneb/mayring

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout MayringCoder source
        uses: actions/checkout@v4
        with:
          repository: nileneb/MayringCoder
          path: MayringCoder
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./MayringCoder
          file: ./MayringCoder/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on u-server
    runs-on: [self-hosted, u-server]
    needs: build-and-push

    steps:
      - name: Pull latest code
        run: |
          cd ~/app.linn.games
          git fetch origin main
          git reset --hard origin/main

      - name: Deploy MayringCoder stack
        timeout-minutes: 10
        run: |
          cd ~/app.linn.games
          ./deploy-mayring.sh 2>&1 | tee /tmp/mayring-deploy-output.txt

  open-issue-on-failure:
    name: Report failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()
    permissions:
      issues: write

    steps:
      - name: Create issue on deploy failure
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🚨 MayringCoder Deploy fehlgeschlagen — ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              '## MayringCoder Deploy-Fehler auf Production',
              '',
              `**Commit:** [\`${{ github.sha }}\`](${{ github.event.head_commit.url }})`,
              `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '## Schritte zur Behebung',
              '1. SSH: `ssh nileneb@u-server`',
              '2. `cd ~/app.linn.games && docker compose -f docker-compose.mayring.yml logs --tail=50`',
              '3. Nach Fix: `./deploy-mayring.sh`',
              '',
              '_Automatisch erstellt von GitHub Actions_',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'deploy-failure'],
            });
