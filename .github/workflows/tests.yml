name: tests
permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: change-me
          POSTGRES_DB: linn_games
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create test .env
        run: printf 'APP_ENV=testing\nAPP_KEY=\nDB_CONNECTION=pgsql\n' > .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: linn_games
          DB_USERNAME: postgres
          DB_PASSWORD: change-me
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php -d memory_limit=512M ./vendor/bin/pest
