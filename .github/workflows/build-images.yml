name: Build & Push Images

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'config/**'
      - 'resources/**'
      - 'routes/**'
      - 'public/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'docker/common/**'
      - 'paper-search-mcp/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            image: nileneb/linn-web
            context: .
            dockerfile: ./docker/common/nginx/dockerfile
          - name: php
            image: nileneb/linn-php
            context: .
            dockerfile: ./docker/common/php-fpm/dockerfile
            target: production
          - name: postgres
            image: nileneb/linn-postgres
            context: .
            dockerfile: ./docker/common/postgres/dockerfile
          - name: paper-search
            image: nileneb/linn-paper-search
            context: ./paper-search-mcp
            dockerfile: ./paper-search-mcp/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: ${{ matrix.image }}:latest,${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false
          sbom: false
          build-args: |
            REVERB_APP_ID=${{ vars.VITE_REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ vars.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=${{ vars.VITE_REVERB_PORT }}
            VITE_REVERB_SCHEME=${{ vars.VITE_REVERB_SCHEME }}
