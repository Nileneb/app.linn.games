name: Check Watcher Logs

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Show watcher container logs
    runs-on: [self-hosted, u-server]

    steps:
      - name: Container status
        run: |
          echo "=== Container Status ==="
          docker ps --filter "name=mayring" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>&1

      - name: Test micro-batch endpoint
        env:
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
        run: |
          echo "=== POST /conversation/micro-batch (expect 200) ==="
          HTTP_STATUS=$(curl -s -o /tmp/mb_response.json -w "%{http_code}" \
            -X POST http://localhost:6480/conversation/micro-batch \
            -H "Authorization: Bearer ${MCP_SERVICE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"turns":[{"role":"user","content":"CI proof-of-life test","timestamp":"2026-04-22T16:00:00Z"}],"session_id":"ci-watcher-test","workspace_slug":"ci-test"}')
          echo "HTTP Status: ${HTTP_STATUS}"
          cat /tmp/mb_response.json 2>/dev/null || true
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✓ BEWEIS: /conversation/micro-batch funktioniert (HTTP 200)"
          else
            echo "✗ FEHLER: HTTP ${HTTP_STATUS}"
            exit 1
          fi

      - name: Diagnose internal connectivity
        run: |
          echo "=== Internal network test from watcher container ==="
          WATCHER=$(docker ps -a --format '{{.Names}}' | grep -i watcher | head -1)
          if [ -n "$WATCHER" ]; then
            echo "DNS resolution of mayring-api from watcher:"
            docker exec "$WATCHER" getent hosts mayring-api 2>&1 || echo "getent not available"
            echo "Ping test:"
            docker exec "$WATCHER" curl -s -o /dev/null -w "http://mayring-api:8090/health → HTTP %{http_code}\n" \
              --connect-timeout 5 http://mayring-api:8090/health 2>&1 || echo "Connection failed"
          fi
          echo "mayring-api networks:"
          docker inspect mayring-mayring-api-1 --format '{{json .NetworkSettings.Networks}}' 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k) for k in d]" 2>/dev/null || true

      - name: Reset watcher state and restart
        run: |
          echo "=== Warte bis API healthy, dann Watcher neu starten ==="
          # Wait for mayring-api healthcheck to pass (it's up 30s now — needs time to warm up)
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' mayring-mayring-api-1 2>/dev/null)
            echo "API health: $STATUS (attempt $i)"
            if [ "$STATUS" = "healthy" ]; then
              break
            fi
            sleep 5
          done
          WATCHER=$(docker ps -a --format '{{.Names}}' | grep -i watcher | head -1)
          if [ -n "$WATCHER" ]; then
            docker restart "$WATCHER"
            echo "Watcher restarted AFTER API healthy: $WATCHER"
            sleep 45
          fi

      - name: Watcher logs after reset (last 30 lines)
        run: |
          echo "=== mayring-watcher logs nach Reset ==="
          WATCHER=$(docker ps -a --format '{{.Names}}' | grep -i watcher | head -1)
          if [ -n "$WATCHER" ]; then
            echo "Container: $WATCHER"
            docker logs "$WATCHER" --tail=30 2>&1
          else
            echo "ERROR: No watcher container found at all"
          fi
