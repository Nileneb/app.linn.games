name: System Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Montags 06:00 UTC

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Benchmark all layers
    runs-on: [self-hosted, u-server]

    steps:
      - name: API latency â€” /health (30 requests, seq)
        id: latency_health
        run: |
          echo "=== mayring-api /health latency (30 requests) ==="
          TIMES=$(for i in $(seq 1 30); do
            curl -s -o /dev/null -w "%{time_total}\n" http://localhost:6480/health
          done)
          echo "$TIMES"
          STATS=$(echo "$TIMES" | awk '
            BEGIN { n=0; s=0 }
            { v[n++]=$1; s+=$1 }
            END {
              asort(v)
              avg=s/n
              p95=v[int(n*0.95)+1]
              printf "avg=%.3f p95=%.3f", avg, p95
            }
          ')
          echo "health_stats=$STATS" >> $GITHUB_OUTPUT
          echo "Result: $STATS"

      - name: API latency â€” /conversation/micro-batch (20 requests, seq)
        id: latency_mb
        env:
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
        run: |
          echo "=== /conversation/micro-batch latency (20 requests) ==="
          PAYLOAD='{"turns":[{"role":"user","content":"bench","timestamp":"2026-01-01T00:00:00Z"}],"session_id":"bench-lat","workspace_slug":"bench"}'
          TIMES=$(for i in $(seq 1 20); do
            curl -s -o /dev/null -w "%{time_total}\n" \
              -X POST http://localhost:6480/conversation/micro-batch \
              -H "Authorization: Bearer ${MCP_SERVICE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          done)
          echo "$TIMES"
          STATS=$(echo "$TIMES" | awk '
            BEGIN { n=0; s=0 }
            { v[n++]=$1; s+=$1 }
            END {
              asort(v)
              avg=s/n
              p95=v[int(n*0.95)+1]
              printf "avg=%.3f p95=%.3f", avg, p95
            }
          ')
          echo "mb_stats=$STATS" >> $GITHUB_OUTPUT
          echo "Result: $STATS"

      - name: Concurrent throughput â€” ab (50 req, c=5)
        id: throughput
        run: |
          echo "=== Concurrent throughput via ab (50 req, 5 concurrent) ==="
          if command -v ab &>/dev/null; then
            RPS=$(ab -n 50 -c 5 http://localhost:6480/health 2>&1 | grep "Requests per second" | awk '{print $4}')
            echo "rps=$RPS" >> $GITHUB_OUTPUT
            ab -n 50 -c 5 http://localhost:6480/health 2>&1 | grep -E "Requests per second|Time per request|Failed requests"
          else
            echo "ab nicht installiert â€” skip"
            echo "rps=n/a" >> $GITHUB_OUTPUT
          fi

      - name: Retrieval quality â€” POST /benchmark (MRR + Recall@5)
        id: retrieval
        env:
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
        run: |
          echo "=== Retrieval Benchmark (MRR + Recall@5) ==="
          JOB_RESP=$(curl -s -X POST http://localhost:6480/benchmark \
            -H "Authorization: Bearer ${MCP_SERVICE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"top_k": 5}')
          echo "Job response: $JOB_RESP"
          JOB_ID=$(echo "$JOB_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('job_id',''))" 2>/dev/null)

          if [ -z "$JOB_ID" ]; then
            echo "WARN: Kein job_id â€” Benchmark-Endpoint mĂ¶glicherweise nicht verfĂĽgbar"
            echo "mrr=n/a recall=n/a hits=n/a" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Job ID: $JOB_ID"

          # Poll bis done (max 3 Minuten = 36 Ă— 5s)
          for i in $(seq 1 36); do
            POLL=$(curl -s -H "Authorization: Bearer ${MCP_SERVICE_TOKEN}" \
              "http://localhost:6480/jobs/${JOB_ID}")
            STATUS=$(echo "$POLL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "  Poll $i: status=$STATUS"
            if [ "$STATUS" = "done" ] || [ "$STATUS" = "error" ]; then
              echo "$POLL" | python3 -c "
import sys, json
job = json.load(sys.stdin)
out = job.get('output', '')
for line in out.splitlines():
    if any(k in line for k in ['MRR', 'Recall', 'Hits', 'Category']):
        print('  ' + line.strip())
"
              # Werte fĂĽr Summary extrahieren
              MRR=$(echo "$POLL" | python3 -c "
import sys, json, re
out = json.load(sys.stdin).get('output','')
m = re.search(r'MRR:\s+([\d.]+)', out)
print(m.group(1) if m else 'n/a')
" 2>/dev/null)
              RECALL=$(echo "$POLL" | python3 -c "
import sys, json, re
out = json.load(sys.stdin).get('output','')
m = re.search(r'Recall@5:\s+([\d.]+)', out)
print(m.group(1) if m else 'n/a')
" 2>/dev/null)
              HITS=$(echo "$POLL" | python3 -c "
import sys, json, re
out = json.load(sys.stdin).get('output','')
m = re.search(r'Hits:\s+(\d+/\d+)', out)
print(m.group(1) if m else 'n/a')
" 2>/dev/null)
              echo "mrr=$MRR" >> $GITHUB_OUTPUT
              echo "recall=$RECALL" >> $GITHUB_OUTPUT
              echo "hits=$HITS" >> $GITHUB_OUTPUT
              break
            fi
            sleep 5
          done

      - name: Phase pipeline timing (last 7 days, status=completed)
        id: pipeline
        run: |
          echo "=== Phase Agent Pipeline Timing (letzte 7 Tage) ==="
          PG=$(docker ps --format '{{.Names}}' | grep -E "postgres" | grep -v mayring | head -1)
          if [ -z "$PG" ]; then
            echo "WARN: Postgres-Container nicht gefunden"
            echo "pipeline=n/a" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Postgres container: $PG"
          RESULT=$(docker exec "$PG" psql -U postgres linn_games -t -A -F'|' -c "
            SELECT
              COUNT(*)::text,
              ROUND(AVG(elapsed_s)::numeric, 1)::text,
              ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY elapsed_s)::numeric, 1)::text,
              ROUND(MAX(elapsed_s)::numeric, 1)::text
            FROM (
              SELECT
                EXTRACT(EPOCH FROM (MAX(updated_at) - MIN(created_at))) AS elapsed_s
              FROM phase_agent_results
              WHERE created_at > NOW() - INTERVAL '7 days'
                AND status = 'completed'
              GROUP BY projekt_id
              HAVING COUNT(DISTINCT phase_nr) >= 4
            ) t;
          " 2>/dev/null || echo "n/a|n/a|n/a|n/a")
          echo "Runs|avg_s|p95_s|max_s: $RESULT"
          echo "pipeline=$RESULT" >> $GITHUB_OUTPUT

      - name: Write GitHub Step Summary
        env:
          HEALTH_STATS: ${{ steps.latency_health.outputs.health_stats }}
          MB_STATS: ${{ steps.latency_mb.outputs.mb_stats }}
          RPS: ${{ steps.throughput.outputs.rps }}
          MRR: ${{ steps.retrieval.outputs.mrr }}
          RECALL: ${{ steps.retrieval.outputs.recall }}
          HITS: ${{ steps.retrieval.outputs.hits }}
          PIPELINE: ${{ steps.pipeline.outputs.pipeline }}
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M UTC")
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## System Benchmark â€” ${TS}

          ### API Latenz (sequentiell, localhost:6480)
          | Endpoint | Avg | p95 |
          |---|---|---|
          | \`/health\` | $(echo "$HEALTH_STATS" | awk -F'[ =]' '{print $2 "s"}') | $(echo "$HEALTH_STATS" | awk -F'[ =]' '{print $4 "s"}') |
          | \`/conversation/micro-batch\` | $(echo "$MB_STATS" | awk -F'[ =]' '{print $2 "s"}') | $(echo "$MB_STATS" | awk -F'[ =]' '{print $4 "s"}') |

          ### Concurrent Throughput (ab, 50 req c=5)
          | Metrik | Wert |
          |---|---|
          | Requests/sec | ${RPS} |

          ### Retrieval QualitĂ¤t (MayringCoder, top_k=5)
          | Metrik | Wert |
          |---|---|
          | MRR | ${MRR} |
          | Recall@5 | ${RECALL} |
          | Hits | ${HITS} |

          ### Phase Agent Pipeline (letzte 7 Tage, â‰Ą4 Phasen)
          | Runs | Avg (s) | p95 (s) | Max (s) |
          |---|---|---|---|
          | $(echo "$PIPELINE" | cut -d'|' -f1) | $(echo "$PIPELINE" | cut -d'|' -f2) | $(echo "$PIPELINE" | cut -d'|' -f3) | $(echo "$PIPELINE" | cut -d'|' -f4) |
          SUMMARY
          echo "Summary geschrieben."
