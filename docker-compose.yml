services:
  web:
    build:
      context: .
      dockerfile: ./docker/common/nginx/dockerfile
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage:ro
      - ./docker/common/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public/build:/var/www/public/build:ro
      - ./public/images:/var/www/public/images:ro
    networks:
      - linn-network
    ports:
      - "6478:80"
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage
      - ./public/build:/var/www/public/build:ro
      - ./public/images:/var/www/public/images:ro
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-cli:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    tty: true
    stdin_open: true
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    volumes:
      - linn-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    user: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - linn-postgres-data:/var/lib/postgresql/data
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  linn-network:
    driver: bridge

volumes:
  linn-postgres-data:
  linn-storage-production:
