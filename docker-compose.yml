services:
  web:
    build:
      context: .
      dockerfile: ./docker/common/nginx/dockerfile
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage:ro
      - ./public:/var/www/public:ro
      - linn-build-assets:/var/www/public/build:ro
      - ./docker/common/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    networks:
      - linn-network
      - linn-shared
    ports:
      - "${APP_PORT:-6481}:80"
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-app.linn.games}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage
      - linn-build-assets:/var/www/public/build-shared
      - ./public/images:/var/www/public/images:ro
    env_file:
      - .env
    networks:
      - linn-network
      - linn-shared
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-cli:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    tty: true
    stdin_open: true
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-test:
    profiles: [test]
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: testing
    entrypoint: []
    tty: true
    stdin_open: true
    env_file:
      - .env
      - .env.testing
    environment:
      - APP_ENV=testing
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
    volumes:
      - ./tests:/var/www/tests:ro
      - ./phpunit.xml:/var/www/phpunit.xml:ro
      - ./.env:/var/www/.env:ro
      - ./.env.testing:/var/www/.env.testing:ro
    networks:
      - linn-network

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    volumes:
      - linn-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - linn-storage-production:/var/www/storage
    networks:
      - linn-network
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    build:
      context: .
      dockerfile: ./docker/common/postgres/dockerfile
    restart: unless-stopped
    user: postgres
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - linn-postgres-data:/var/lib/postgresql/data
      - ./docker/common/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    networks:
      - linn-network
      - linn-shared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-paper-search:
    build:
      context: ./paper-search-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      - BEARER_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_TRANSPORT=streamable-http
      - MCP_MESSAGES_PATH=/paper-messages/
      - DOWNLOAD_PATH=/data/papers
      - LARAVEL_INGEST_URL=http://php-fpm/api/papers/ingest
      - LARAVEL_MCP_TOKEN=${MCP_AUTH_TOKEN}
      - LARAVEL_DB_HOST=postgres
      - LARAVEL_DB_PORT=5432
      - LARAVEL_DB_USER=${POSTGRES_USERNAME}
      - LARAVEL_DB_PASSWORD=${POSTGRES_PASSWORD}
      - LARAVEL_DB_NAME=${POSTGRES_DATABASE}
      - PAPER_SEARCH_MCP_UNPAYWALL_EMAIL=${PAPER_SEARCH_MCP_UNPAYWALL_EMAIL}
      - PAPER_SEARCH_MCP_CORE_API_KEY=${PAPER_SEARCH_MCP_CORE_API_KEY}
      - PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY=${PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY}
      - PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN=${PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN}
      - PAPER_SEARCH_MCP_DOAJ_API_KEY=${PAPER_SEARCH_MCP_DOAJ_API_KEY}
      - PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL=${PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL}
      - PAPER_SEARCH_MCP_IEEE_API_KEY=${PAPER_SEARCH_MCP_IEEE_API_KEY}
      - PAPER_SEARCH_MCP_ACM_API_KEY=${PAPER_SEARCH_MCP_ACM_API_KEY}
    volumes:
      - linn-papers-data:/data/papers
    networks:
      - linn-network
    depends_on:
      php-fpm:
        condition: service_started
      postgres:
        condition: service_healthy

networks:
  linn-network:
    driver: bridge
  linn-shared:
    external: true

volumes:
  linn-postgres-data:
  linn-storage-production:
  linn-build-assets:
  linn-papers-data:
