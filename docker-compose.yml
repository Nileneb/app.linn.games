services:
  web:
    build:
      context: .
      dockerfile: ./docker/common/nginx/dockerfile
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage:ro
      - ./public:/var/www/public:ro
      - linn-build-assets:/var/www/public/build:ro
      - ./docker/common/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    networks:
      - linn-network
    ports:
      - "${APP_PORT:-6481}:80"
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage
      - linn-build-assets:/var/www/public/build-shared
      - ./public/images:/var/www/public/images:ro
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-cli:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    tty: true
    stdin_open: true
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-test:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: testing
    entrypoint: []
    tty: true
    stdin_open: true
    env_file:
      - .env
      - .env.testing
    environment:
      - APP_ENV=testing
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
    volumes:
      - ./tests:/var/www/tests:ro
      - ./phpunit.xml:/var/www/phpunit.xml:ro
      - ./.env:/var/www/.env:ro
      - ./.env.testing:/var/www/.env.testing:ro
    networks:
      - linn-network

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    volumes:
      - linn-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - linn-storage-production:/var/www/storage
    networks:
      - linn-network
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    build:
      context: .
      dockerfile: ./docker/common/postgres/dockerfile
    restart: unless-stopped
    user: postgres
    # ports:
    #   - "5433:5432"
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - linn-postgres-data:/var/lib/postgresql/data
      - ./docker/common/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    networks:
      - linn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mcp-paper-search:
    build:
      context: ./paper-search-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      - BEARER_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_MESSAGES_PATH=/paper-messages/
      - DOWNLOAD_PATH=/data/papers
      - LARAVEL_INGEST_URL=http://php-fpm/api/papers/ingest
      - LARAVEL_MCP_TOKEN=${MCP_AUTH_TOKEN}
      - PAPER_SEARCH_MCP_UNPAYWALL_EMAIL=${PAPER_SEARCH_MCP_UNPAYWALL_EMAIL}
      - PAPER_SEARCH_MCP_CORE_API_KEY=${PAPER_SEARCH_MCP_CORE_API_KEY}
      - PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY=${PAPER_SEARCH_MCP_SEMANTIC_SCHOLAR_API_KEY}
      - PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN=${PAPER_SEARCH_MCP_ZENODO_ACCESS_TOKEN}
      - PAPER_SEARCH_MCP_DOAJ_API_KEY=${PAPER_SEARCH_MCP_DOAJ_API_KEY}
      - PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL=${PAPER_SEARCH_MCP_GOOGLE_SCHOLAR_PROXY_URL}
      - PAPER_SEARCH_MCP_IEEE_API_KEY=${PAPER_SEARCH_MCP_IEEE_API_KEY}
      - PAPER_SEARCH_MCP_ACM_API_KEY=${PAPER_SEARCH_MCP_ACM_API_KEY}
    volumes:
      - linn-papers-data:/data/papers
    networks:
      - linn-network
    depends_on:
      php-fpm:
        condition: service_started

  mayring-api:
    build:
      context: ./MayringCoder
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "uvicorn", "src.api_server:app", "--host", "0.0.0.0", "--port", "8090"]
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.178.11:11434}
      - OLLAMA_MODEL=${MAYRING_OLLAMA_MODEL:-qwen2.5:1.5b}
      - MAYRING_MCP_AUTH_TOKEN=${MAYRING_MCP_AUTH_TOKEN}
      - CHROMA_PATH=/app/cache/chroma
      # PostgreSQL for Sanctum token validation (external Claude users)
      - LARAVEL_DB_HOST=postgres
      - LARAVEL_DB_PORT=5432
      - LARAVEL_DB_USER=${POSTGRES_USERNAME}
      - LARAVEL_DB_PASSWORD=${POSTGRES_PASSWORD}
      - LARAVEL_DB_NAME=${POSTGRES_DATABASE}
    volumes:
      - linn-mayring-cache:/app/cache
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy

  mayring-mcp:
    build:
      context: ./MayringCoder
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "src.mcp_server"]
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=8092
      - MCP_AUTH_ENABLED=true
      - MCP_AUTH_SECRET=${MAYRING_MCP_JWT_SECRET}
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.178.11:11434}
      - OLLAMA_MODEL=${MAYRING_OLLAMA_MODEL:-qwen2.5:1.5b}
      - CHROMA_PATH=/app/cache/chroma
    volumes:
      - linn-mayring-cache:/app/cache
    networks:
      - linn-network

  mayring-pi:
    build:
      context: ./MayringCoder
      dockerfile: docker/Dockerfile
    command: ["python", "pi_server.py"]
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.178.11:11434}
      - OLLAMA_MODEL=${MAYRING_OLLAMA_MODEL:-qwen2.5:1.5b}
      - PI_PORT=8091
    networks:
      - linn-network
    extra_hosts:
      - "host.docker.internal:host-gateway"


networks:
  linn-network:
    driver: bridge

volumes:
  linn-postgres-data:
  linn-storage-production:
  linn-build-assets:
  linn-papers-data:
  linn-mayring-cache:
