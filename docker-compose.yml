services:
  web:
    build:
      context: .
      dockerfile: ./docker/common/nginx/dockerfile
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage:ro
      - ./public:/var/www/public:ro
      - linn-build-assets:/var/www/public/build:ro
      - ./docker/common/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    networks:
      - linn-network
    ports:
      - "${APP_PORT:-6481}:80"
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - linn-storage-production:/var/www/storage
      - linn-build-assets:/var/www/public/build-shared
      - ./public/images:/var/www/public/images:ro
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-cli:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    tty: true
    stdin_open: true
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  php-test:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: testing
    entrypoint: []
    tty: true
    stdin_open: true
    env_file:
      - .env
    environment:
      - APP_ENV=testing
      - DB_CONNECTION=sqlite
      - "DB_DATABASE=:memory:"
    volumes:
      - ./tests:/var/www/tests:ro
      - ./phpunit.xml:/var/www/phpunit.xml:ro
      - ./.env:/var/www/.env:ro
    networks:
      - linn-network

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/common/php-fpm/dockerfile
      target: production
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    volumes:
      - linn-storage-production:/var/www/storage
    env_file:
      - .env
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    build:
      context: .
      dockerfile: ./docker/common/postgres/dockerfile
    restart: unless-stopped
    user: postgres
    # ports:
    #   - "5433:5432"
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - linn-postgres-data:/var/lib/postgresql/data
      - ./docker/common/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - linn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-mcp:
    image: crystaldba/postgres-mcp
    restart: unless-stopped
    command: ["--access-mode=unrestricted", "--transport=sse"]
    environment:
      - DATABASE_URI=postgresql://${LANGDOCK_DB_USERNAME}:${LANGDOCK_DB_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
    # ports:
    #   - "8200:8000"
    networks:
      - linn-network
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - linn-ollama-data:/root/.ollama
    networks:
      - linn-network

  mcp-paper-search:
    build:
      context: ./paper-search-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      - BEARER_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_MESSAGES_PATH=/paper-messages/
      - DOWNLOAD_PATH=/data/papers
      - LARAVEL_INGEST_URL=http://php-fpm/api/papers/ingest
      - LARAVEL_MCP_TOKEN=${MCP_AUTH_TOKEN}
    volumes:
      - linn-papers-data:/data/papers
    networks:
      - linn-network
    depends_on:
      ollama:
        condition: service_started
      php-fpm:
        condition: service_started

networks:
  linn-network:
    driver: bridge

volumes:
  linn-postgres-data:
  linn-storage-production:
  linn-build-assets:
  linn-papers-data:
  linn-ollama-data:
