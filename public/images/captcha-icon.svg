<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="64" cy="64" r="62" fill="#f4f4f5" stroke="#a1a1a1" stroke-width="1.5"/>

  <!-- Subtle inner circle -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#d4d4d8" stroke-width="0.5"/>

  <!-- North arrow (large, prominent, dark) -->
  <g id="north-arrow">
    <!-- Arrow shaft -->
    <rect x="60" y="20" width="8" height="28" fill="#18181b" rx="1"/>
    <!-- Arrow head -->
    <polygon points="64,12 72,28 56,28" fill="#18181b"/>
  </g>

  <!-- South arrow (small, light) -->
  <g id="south-arrow">
    <!-- Arrow shaft -->
    <rect x="60" y="80" width="8" height="28" fill="#a1a1a1" rx="1"/>
    <!-- Arrow head -->
    <polygon points="64,116 56,100 72,100" fill="#a1a1a1"/>
  </g>

  <!-- East tick mark -->
  <g id="east-mark">
    <line x1="105" y1="62" x2="115" y2="64" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="107" y1="66" x2="115" y2="64" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- West tick mark -->
  <g id="west-mark">
    <line x1="23" y1="62" x2="13" y2="64" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="66" x2="13" y2="64" stroke="#71717a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Center dot -->
  <circle cx="64" cy="64" r="3" fill="#27272a"/>
</svg>