; =============================================================================
; PHP Dev-Overrides — OPcache Timestamp-Check + Error Display
; =============================================================================
; Geladen als zz-dev.ini (nach allen anderen conf.d Snippets).
; Nur aktiv via Bind-Mount in docker-compose.override.yml.
; =============================================================================

[opcache]
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

[PHP]
display_errors = On
error_reporting = E_ALL
