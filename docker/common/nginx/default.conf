server {
    listen 80;
    server_name app.linn.games;

    # Docker internal DNS — resolves service names lazily (not at startup)
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /var/www/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    set $real_scheme $scheme;
    if ($http_x_forwarded_proto) {
        set $real_scheme $http_x_forwarded_proto;
    }

    # Livewire v3 assets
    location ~ ^/vendor/livewire/(.*)$ {
        fastcgi_pass php-fpm:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI /livewire/$1?$args;
        fastcgi_param QUERY_STRING $args;
    }

    location ~ ^/livewire/(.*)$ {
        try_files $uri /index.php?$query_string;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* ^/(?!livewire/|vendor/livewire/).*\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # OAuth endpoint for MCP authorize — routes to Laravel
    location = /mcp/authorize {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Paper Search MCP Endpoint ─────────────────────────────────────────
    location /paper-mcp/ {
        limit_req zone=mcp burst=20 nodelay;

        set $auth_ok 0;
        if ($http_authorization = "Bearer __MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($http_x_api_key = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($arg_token = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($auth_ok = 0) {
            return 401 '{"error": "Unauthorized"}';
        }

        set $paper_mcp_upstream http://mcp-paper-search:8089;
        rewrite ^/paper-mcp/(.*) /$1 break;
        proxy_pass $paper_mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Authorization "Bearer __MCP_AUTH_TOKEN__";
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /paper-mcp {
        return 301 /paper-mcp/$is_args$args;
    }

    location /paper-messages/ {
        limit_req zone=mcp burst=200 nodelay;

        set $auth_ok 0;
        if ($http_authorization = "Bearer __MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($http_x_api_key = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($arg_token = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($auth_ok = 0) {
            return 401 '{"error": "Unauthorized"}';
        }

        set $paper_mcp_upstream http://mcp-paper-search:8089;
        proxy_pass $paper_mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Authorization "Bearer __MCP_AUTH_TOKEN__";
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Ollama Embedding Proxy ────────────────────────────────────────────
    location /ollama/ {
        limit_req zone=mcp burst=20 nodelay;

        set $auth_ok 0;
        if ($http_authorization = "Bearer __MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($http_x_api_key = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($arg_token = "__MCP_AUTH_TOKEN__") {
            set $auth_ok 1;
        }
        if ($auth_ok = 0) {
            return 401 '{"error": "Unauthorized"}';
        }

        rewrite ^/ollama/(.*) /$1 break;
        set $ollama_upstream https://three.linn.games;
        proxy_pass $ollama_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host three.linn.games;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /ollama {
        return 301 /ollama/$is_args$args;
    }

    # ── WebSocket (Laravel Reverb) ────────────────────────────────────────
    location = /app {
        set $reverb_upstream http://reverb:8080;
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /app/ {
        set $reverb_upstream http://reverb:8080;
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /apps {
        set $reverb_upstream http://reverb:8080;
        proxy_pass $reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(env|git|gitignore|htaccess) {
        deny all;
    }
}
