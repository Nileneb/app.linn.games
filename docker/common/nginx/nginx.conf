# Basic Nginx configuration for Laravel
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Trust X-Forwarded headers from Docker and upstream proxies
    set_real_ip_from 172.0.0.0/8;     # Docker networks
    set_real_ip_from 10.0.0.0/8;      # Private networks
    set_real_ip_from 192.168.0.0/16;  # Private networks
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json
               application/javascript application/xml+rss application/rss+xml
               font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    sendfile        on;
    keepalive_timeout 65;

    # File upload limits
    client_max_body_size 100M;

    # Rate limiting for MCP endpoints (10 req/s per client IP; burst configured per location)
    limit_req_zone $binary_remote_addr zone=mcp:10m rate=10r/s;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
