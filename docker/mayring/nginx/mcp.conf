# ── MayringCoder MCP HTTP Transport ──────────────────────────────────────────
# Synology NAS strips Authorization header — re-inject from ?token= query param.
# JWT payload: {"workspace_id": "uuid"} — decoded by FastMCP _JWTAuthMiddleware.
server {
    listen 80;
    server_name mcp.linn.games;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $real_scheme $scheme;
    if ($http_x_forwarded_proto) {
        set $real_scheme $http_x_forwarded_proto;
    }

    # Gradio API calls (WebSocket + HTTP)
    location /gradio_api/ {
        set $mayring_ui_upstream http://mayring-webui:7860;
        proxy_pass $mayring_ui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host mcp.linn.games;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host mcp.linn.games;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # Gradio theme CSS
    location = /theme.css {
        set $mayring_ui_upstream http://mayring-webui:7860;
        proxy_pass $mayring_ui_upstream;
        proxy_set_header Host mcp.linn.games;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host mcp.linn.games;
    }

    # Gradio Web-UI (MayringCoder Dashboard)
    location /ui/ {
        set $mayring_ui_upstream http://mayring-webui:7860;
        rewrite ^/ui/(.*) /$1 break;
        proxy_pass $mayring_ui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host mcp.linn.games;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host mcp.linn.games;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # MayringCoder REST-API (src/api/server.py) — routen die NICHT zum
    # MCP-Server gehören. Diese Regex-location gewinnt gegen die default
    # `location /` unten. Neue mayring-api-Endpoints MÜSSEN in dieser Liste
    # stehen, sonst landen sie beim MCP und werfen 404 (so geschehen mit
    # /conversation/micro-batch beim ersten Watcher-Push).
    location ~ ^/(health|analyze|overview|turbulence|benchmark|populate|issues|papers|duel|pi-task|memory|wiki|ambient|predictive|jobs|reports|conversation|mcp-service|mayring)(/|$) {
        set $mayring_api_upstream http://mayring-api:8090;
        proxy_pass $mayring_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # MayringCoder MCP — default upstream (OAuth, /sse, /messages)
    location / {
        set $mayring_mcp_upstream http://mayring-mcp:8092;
        proxy_pass $mayring_mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
