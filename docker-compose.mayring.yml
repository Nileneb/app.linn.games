# MayringCoder Stack — deployed independently from app.linn.games stack.
# Prerequisite: docker network create linn-shared (once on server)
# Deploy: ./deploy-mayring.sh

services:
  mayring-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MAYRING_PORT:-6480}:80"
    volumes:
      - ./docker/mayring/nginx/mcp.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mayring-internal
      - linn-shared
    depends_on:
      - mayring-webui
      - mayring-mcp

  mayring-api:
    image: nileneb/mayring:latest
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8090
    restart: unless-stopped
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: http://web
    volumes:
      - linn-mayring-cache:/app/cache
      - ./reports:/app/reports
      - ./secrets:/secrets:ro
      - linn-papers-data:/data/papers:ro
    networks:
      - mayring-internal
      - linn-shared

  mayring-mcp:
    image: nileneb/mayring:latest
    command: python -m src.mcp_server
    restart: unless-stopped
    env_file: .env.production
    environment:
      MCP_HTTP_PORT: 8092
      MCP_HTTP_HOST: 0.0.0.0
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal

  mayring-pi:
    image: nileneb/mayring:latest
    command: python -m src.agents.pi_server
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal

  mayring-webui:
    image: nileneb/mayring:latest
    command: python -m src.api.web_ui --host 0.0.0.0
    restart: unless-stopped
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: http://web
      GRADIO_ROOT_PATH: /ui
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
      - linn-shared

networks:
  mayring-internal:
    driver: bridge
  linn-shared:
    external: true

volumes:
  linn-mayring-cache:
    external: true
  linn-papers-data:
    external: true
