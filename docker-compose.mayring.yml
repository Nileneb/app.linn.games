# MayringCoder Stack — deployed independently from app.linn.games stack.
# Prerequisite: docker network create linn-shared (once on server)
# Deploy: ./deploy-mayring.sh

services:
  mayring-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MAYRING_PORT:-6480}:80"
    volumes:
      - ./docker/mayring/nginx/mcp.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mayring-internal
      - linn-shared
    depends_on:
      - mayring-webui
      - mayring-mcp

  mayring-api:
    image: nileneb/mayring:latest
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8090
    restart: unless-stopped
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: http://web
    volumes:
      - linn-mayring-cache:/app/cache
      - ./reports:/app/reports
      - ./secrets:/secrets:ro
      - linn-papers-data:/data/papers:ro
    networks:
      - mayring-internal
      - linn-shared

  mayring-mcp:
    image: nileneb/mayring:latest
    command: python -m src.api.mcp
    restart: unless-stopped
    env_file: .env.production
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: 8092
      MCP_HTTP_HOST: 0.0.0.0
      MCP_AUTH_ENABLED: "true"
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
      - linn-shared

  mayring-pi:
    image: nileneb/mayring:latest
    command: python -m src.agents.pi_server
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal

  mayring-webui:
    image: nileneb/mayring:latest
    command: python -m src.api.web_ui --host 0.0.0.0
    restart: unless-stopped
    env_file: .env.production
    environment:
      LARAVEL_INTERNAL_URL: http://web
      GRADIO_ROOT_PATH: /ui
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
      - linn-shared

  # Issue #52 — inkrementeller Claude-Conversation-Watcher.
  # Activate on a dev host (where ~/.claude/projects exists):
  #   CLAUDE_PROJECTS_DIR=~/.claude/projects \
  #     docker compose -f docker-compose.mayring.yml --profile watcher up -d mayring-watcher
  # Post-hook triggers /wiki/generate on the api so Wiki/Ambient/Predictive
  # stay fresh without restarting mayring-api.
  mayring-watcher:
    image: nileneb/mayring:latest
    profiles: ["watcher"]
    restart: unless-stopped
    env_file: .env.production
    environment:
      CLAUDE_PROJECTS_DIR: "/host_claude"
    command:
      - python
      - -m
      - tools.conversation_watcher
      - --workspace-id
      - "system"
      - --hook-cmd
      - "curl -fsS -X POST -H 'Authorization: Bearer ${MCP_SERVICE_TOKEN}' -H 'Content-Type: application/json' -d '{\"repo\":\"${WATCHER_REPO:-}\"}' http://mayring-api:8090/wiki/generate >/dev/null"
      - --hook-interval
      - "1800"
    volumes:
      - linn-mayring-cache:/app/cache
      - ${CLAUDE_PROJECTS_DIR:-/tmp/empty_claude_projects}:/host_claude:ro
    networks:
      - mayring-internal
    depends_on:
      - mayring-api

networks:
  mayring-internal:
    driver: bridge
  linn-shared:
    external: true

volumes:
  linn-mayring-cache:
    external: true
  linn-papers-data:
    external: true
