# MayringCoder Stack — deployed independently from app.linn.games stack.
# Prerequisite: docker network create linn-shared (once on server)
# Deploy: ./deploy-mayring.sh

services:
  mayring-nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MAYRING_PORT:-6480}:80"
    volumes:
      - ./docker/mayring/nginx/mcp.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mayring-internal
      - linn-shared
    depends_on:
      - mayring-webui
      - mayring-mcp

  mayring-api:
    image: nileneb/mayring:latest
    command: python -m uvicorn src.api.server:app --host 0.0.0.0 --port 8090
    restart: unless-stopped
    env_file: .env.mayring
    environment:
      LARAVEL_INTERNAL_URL: http://web
      OLLAMA_SSL_VERIFY: "false"
      JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
    volumes:
      - linn-mayring-cache:/app/cache
      - ./reports:/app/reports
      - ./secrets:/secrets:ro
      - linn-papers-data:/data/papers:ro
    networks:
      - mayring-internal
      - linn-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  mayring-mcp:
    image: nileneb/mayring:latest
    command: python -m src.api.mcp
    restart: unless-stopped
    env_file: .env.mayring
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: 8092
      MCP_HTTP_HOST: 0.0.0.0
      MCP_AUTH_ENABLED: "true"
      JWT_PUBLIC_KEY_PATH: /secrets/jwt_public.pem
      MAYRING_API_URL: http://mayring-api:8090
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
      - linn-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mayring-pi:
    image: nileneb/mayring:latest
    command: python -m src.agents.pi_server
    restart: unless-stopped
    env_file: .env.mayring
    volumes:
      - linn-mayring-cache:/app/cache
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mayring-webui:
    image: nileneb/mayring:latest
    command: python -m src.api.web_ui --host 0.0.0.0
    restart: unless-stopped
    env_file: .env.mayring
    environment:
      LARAVEL_INTERNAL_URL: http://web
      GRADIO_ROOT_PATH: /ui
      MAYRING_API_URL: http://mayring-api:8090
    volumes:
      - linn-mayring-cache:/app/cache:ro
      - ./secrets:/secrets:ro
    networks:
      - mayring-internal
      - linn-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


networks:
  mayring-internal:
    driver: bridge
  linn-shared:
    external: true

volumes:
  linn-mayring-cache:
    external: true
  linn-papers-data:
    external: true
