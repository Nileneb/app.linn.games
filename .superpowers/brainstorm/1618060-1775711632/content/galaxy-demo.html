<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Cluster Explorer — Galaxy Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; pointer-events: none;
  padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: flex-start;
}
#hud-left { color: #6366f1; font-size: 11px; line-height: 1.8; text-shadow: 0 0 8px #6366f1; }
#hud-right { color: #06b6d4; font-size: 11px; line-height: 1.8; text-align: right; text-shadow: 0 0 8px #06b6d4; }
#hud-title { font-size: 16px; font-weight: bold; color: #a5b4fc; letter-spacing: 3px; text-shadow: 0 0 12px #6366f1; }

#crosshair {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px; pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(99,102,241,0.8);
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

#info-panel {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,30,0.85); border: 1px solid #6366f1;
  border-radius: 8px; padding: 12px 20px; color: #a5b4fc;
  font-size: 11px; text-align: center; pointer-events: none;
  transition: opacity 0.3s; max-width: 400px;
  box-shadow: 0 0 20px rgba(99,102,241,0.3);
}
#info-panel .cluster-name { font-size: 14px; color: #e0e7ff; font-weight: bold; margin-bottom: 4px; }
#info-panel .cluster-stats { color: #818cf8; }

#controls-hint {
  position: fixed; bottom: 20px; right: 20px;
  color: rgba(99,102,241,0.5); font-size: 10px; line-height: 1.9; text-align: right;
  pointer-events: none;
}

#score { font-size: 13px; color: #f59e0b; text-shadow: 0 0 8px #f59e0b; }
#anomaly-alert {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -150%);
  background: rgba(239,68,68,0.15); border: 1px solid #ef4444;
  color: #fca5a5; font-size: 12px; padding: 8px 16px; border-radius: 4px;
  pointer-events: none; transition: all 0.3s; opacity: 0;
  text-shadow: 0 0 8px #ef4444;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-left">
    <div id="hud-title">CLUSTER EXPLORER</div>
    <div>PROJEKT: Systematische Review Alpha</div>
    <div>CLUSTER: <span id="cluster-count">7</span> aktiv</div>
    <div>PAPER: <span id="paper-count">312</span> indexiert</div>
    <div style="margin-top:6px;color:#ef4444;text-shadow:0 0 8px #ef4444">ANOMALIEN: <span id="anomaly-count">0</span> offen</div>
  </div>
  <div id="hud-right">
    <div id="score">SCORE: 0</div>
    <div>KLASSIFIZIERUNGEN: <span id="classified">0</span></div>
    <div>PRÄZISION: <span id="precision">—</span></div>
    <div style="margin-top:6px">EVIDENZ-STÄRKE</div>
    <div style="color:#10b981;text-shadow:0 0 8px #10b981"><span id="evidence">▓▓▓▓▓░░░░░</span></div>
  </div>
</div>

<div id="crosshair"></div>
<div id="info-panel" style="opacity:0">
  <div class="cluster-name" id="panel-name"></div>
  <div class="cluster-stats" id="panel-stats"></div>
</div>
<div id="anomaly-alert">⚠ ANOMALIE DETEKTIERT — FEUER!</div>
<div id="controls-hint">
  MAUS: Kamera<br>
  W/S: vor/zurück<br>
  A/D: links/rechts<br>
  KLICK: Klassifizieren<br>
  LEERTASTE: Feuer
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENE SETUP ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000005, 0.004);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 20, 80);

// ── CLUSTER DATA (würde aus UMAP/pgvector kommen) ─────────────────────
const clusters = [
  { label: 'Intervention', desc: 'Therapeutische Maßnahmen', treffer: 142, relevanz: 0.92,
    pos: [0,0,0],       color: 0x6366f1, size: 8 },
  { label: 'Population',   desc: 'Zielgruppen & Stichproben', treffer: 89,  relevanz: 0.78,
    pos: [35,8,-20],    color: 0x10b981, size: 6 },
  { label: 'Outcome',      desc: 'Primäre Endpunkte',         treffer: 115, relevanz: 0.85,
    pos: [-30,5,15],    color: 0x06b6d4, size: 7 },
  { label: 'Studiendesign',desc: 'RCT, Kohorten, Case-Control',treffer: 67, relevanz: 0.65,
    pos: [20,-15,35],   color: 0xf59e0b, size: 5 },
  { label: 'Bias & Qualität',desc:'RoB2, CASP Bewertungen',  treffer: 43,  relevanz: 0.71,
    pos: [-45,-10,-30], color: 0xec4899, size: 4 },
  { label: 'Comparator',   desc: 'Kontrollgruppen & Vergleich',treffer: 38, relevanz: 0.60,
    pos: [50,20,10],    color: 0xa78bfa, size: 4 },
  { label: 'Setting',      desc: 'Klinische Umgebungen',       treffer: 29, relevanz: 0.55,
    pos: [-15,25,-50],  color: 0xfb923c, size: 3.5 },
];

// ── STAR FIELD ────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 4000; i++) {
  starVerts.push((Math.random()-0.5)*800, (Math.random()-0.5)*800, (Math.random()-0.5)*800);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0.7 });
scene.add(new THREE.Points(starGeo, starMat));

// ── AMBIENT NEBULA ────────────────────────────────────────────────────
const nebulaGeo = new THREE.BufferGeometry();
const nebulaVerts = [];
for (let i = 0; i < 800; i++) {
  const r = Math.random() * 120;
  const theta = Math.random() * Math.PI * 2;
  const phi = (Math.random()-0.5) * Math.PI * 0.3;
  nebulaVerts.push(r*Math.cos(theta), r*Math.sin(phi)*20, r*Math.sin(theta));
}
nebulaGeo.setAttribute('position', new THREE.Float32BufferAttribute(nebulaVerts, 3));
const nebulaMat = new THREE.PointsMaterial({ color: 0x4338ca, size: 1.5, transparent: true, opacity: 0.15 });
scene.add(new THREE.Points(nebulaGeo, nebulaMat));

// ── CLUSTER PLANETS ───────────────────────────────────────────────────
const planetMeshes = [];
const glowMeshes   = [];
const ringMeshes   = [];

clusters.forEach((c, i) => {
  const geo  = new THREE.SphereGeometry(c.size, 32, 32);
  const mat  = new THREE.MeshPhongMaterial({ color: c.color, emissive: c.color, emissiveIntensity: 0.3, shininess: 80 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...c.pos);
  mesh.userData = { cluster: c, index: i };
  scene.add(mesh);
  planetMeshes.push(mesh);

  // Glow halo
  const glowGeo = new THREE.SphereGeometry(c.size * 1.6, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: c.color, transparent: true, opacity: 0.06, side: THREE.BackSide });
  const glow    = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(...c.pos);
  scene.add(glow);
  glowMeshes.push(glow);

  // Orbit ring for big clusters
  if (c.treffer > 80) {
    const ringGeo = new THREE.RingGeometry(c.size*1.8, c.size*2.0, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: c.color, transparent: true, opacity: 0.12, side: THREE.DoubleSide });
    const ring    = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(...c.pos);
    ring.rotation.x = Math.PI/2 + (Math.random()-0.5)*0.5;
    scene.add(ring);
    ringMeshes.push(ring);
  }

  // Point light per planet
  const light = new THREE.PointLight(c.color, 0.6, c.size * 12);
  light.position.set(...c.pos);
  scene.add(light);
});

// Ambient + directional
scene.add(new THREE.AmbientLight(0x111133, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.4);
sun.position.set(50, 80, 50);
scene.add(sun);

// ── ANOMALY PAPERS (Outlier-Paper aus pgvector-Distanz) ───────────────
const anomalies = [];
let anomalyCount = 0;
const anomalyEl = document.getElementById('anomaly-count');
const alertEl   = document.getElementById('anomaly-alert');

function spawnAnomaly() {
  const geo = new THREE.OctahedronGeometry(1.2, 0);
  const mat = new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.8, wireframe: false });
  const mesh = new THREE.Mesh(geo, mat);
  // Spawn near a random cluster but offset (it's an outlier)
  const c = clusters[Math.floor(Math.random()*clusters.length)];
  mesh.position.set(
    c.pos[0] + (Math.random()-0.5)*30,
    c.pos[1] + (Math.random()-0.5)*20,
    c.pos[2] + (Math.random()-0.5)*30
  );
  mesh.userData = { type: 'anomaly', speed: (Math.random()-0.5)*0.05 };
  scene.add(mesh);
  anomalies.push(mesh);
  anomalyCount++;
  anomalyEl.textContent = anomalyCount;

  alertEl.style.opacity = '1';
  alertEl.style.transform = 'translate(-50%, -170%)';
  setTimeout(() => {
    alertEl.style.opacity = '0';
    alertEl.style.transform = 'translate(-50%, -150%)';
  }, 2500);
}

// ── LASER / PROJECTILES ───────────────────────────────────────────────
const lasers = [];
function fireLaser() {
  const geo = new THREE.CylinderGeometry(0.05, 0.05, 4, 6);
  geo.rotateX(Math.PI/2);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const laser = new THREE.Mesh(geo, mat);
  laser.position.copy(camera.position);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  laser.userData = { dir, speed: 3.5, life: 80 };
  laser.lookAt(laser.position.clone().add(dir));
  scene.add(laser);
  lasers.push(laser);
}

// ── DARK MATTER (excluded papers — invisible gravity) ─────────────────
const darkMatter = [];
for (let i = 0; i < 12; i++) {
  const geo = new THREE.SphereGeometry(0.4, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0x4b5563, transparent: true, opacity: 0.2, wireframe: true });
  const m   = new THREE.Mesh(geo, mat);
  m.position.set((Math.random()-0.5)*180, (Math.random()-0.5)*60, (Math.random()-0.5)*180);
  m.userData = { drift: new THREE.Vector3((Math.random()-0.5)*0.02, (Math.random()-0.5)*0.01, (Math.random()-0.5)*0.02) };
  scene.add(m);
  darkMatter.push(m);
}

// ── FLIGHT CONTROLS ───────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); fireLaser(); }
});
document.addEventListener('keyup',  e => keys[e.code] = false);

let mouseX = 0, mouseY = 0, locked = false;
canvas.addEventListener('click', () => {
  if (!locked) { canvas.requestPointerLock(); }
  else { fireLaser(); }
});
document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === canvas; });
document.addEventListener('mousemove', e => {
  if (locked) { mouseX -= e.movementX * 0.002; mouseY -= e.movementY * 0.002; mouseY = Math.max(-1.2, Math.min(1.2, mouseY)); }
});

// ── HUD STATE ─────────────────────────────────────────────────────────
let score = 0, classified = 0;
const scoreEl      = document.getElementById('score');
const classifiedEl = document.getElementById('classified');
const precisionEl  = document.getElementById('precision');
const evidenceEl   = document.getElementById('evidence');
const infoPanelEl  = document.getElementById('info-panel');
const panelNameEl  = document.getElementById('panel-name');
const panelStatsEl = document.getElementById('panel-stats');

let closestCluster = null;

function updateEvidence() {
  const bars = Math.min(10, Math.floor((classified/3)));
  evidenceEl.textContent = '▓'.repeat(bars) + '░'.repeat(10-bars);
  evidenceEl.style.color = bars > 6 ? '#10b981' : bars > 3 ? '#f59e0b' : '#ef4444';
}

// ── RAYCASTER for cluster proximity ──────────────────────────────────
const raycaster = new THREE.Raycaster();
const center2d  = new THREE.Vector2(0, 0);

// ── MAIN LOOP ─────────────────────────────────────────────────────────
let t = 0;
let anomalyTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = mouseX;
  camera.rotation.x = mouseY;

  // Flight
  const forward = new THREE.Vector3();
  const right   = new THREE.Vector3();
  camera.getWorldDirection(forward);
  right.crossVectors(forward, camera.up).normalize();
  const speed = 0.35;
  if (keys['KeyW']) camera.position.addScaledVector(forward, speed);
  if (keys['KeyS']) camera.position.addScaledVector(forward, -speed);
  if (keys['KeyA']) camera.position.addScaledVector(right, -speed);
  if (keys['KeyD']) camera.position.addScaledVector(right,  speed);

  // Planet pulse + rotation
  planetMeshes.forEach((m, i) => {
    const phase = i * 1.2;
    m.rotation.y += 0.003;
    glowMeshes[i].material.opacity = 0.04 + 0.03 * Math.sin(t * 1.5 + phase);
  });

  // Anomaly spin + drift
  anomalies.forEach(m => {
    m.rotation.x += 0.04;
    m.rotation.y += 0.06;
    m.position.y += m.userData.speed;
    m.material.emissiveIntensity = 0.5 + 0.5 * Math.abs(Math.sin(t * 4));
  });

  // Dark matter drift
  darkMatter.forEach(m => { m.position.addScaledVector(m.userData.drift, 1); m.rotation.y += 0.01; });

  // Laser movement + hit detection
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.position.addScaledVector(l.userData.dir, l.userData.speed);
    l.userData.life--;
    if (l.userData.life <= 0) { scene.remove(l); lasers.splice(i, 1); continue; }

    // Hit anomalies
    for (let j = anomalies.length - 1; j >= 0; j--) {
      if (l.position.distanceTo(anomalies[j].position) < 3) {
        scene.remove(anomalies[j]); anomalies.splice(j, 1);
        scene.remove(l); lasers.splice(i, 1);
        anomalyCount = Math.max(0, anomalyCount - 1);
        anomalyEl.textContent = anomalyCount;
        score += 100; classified++;
        scoreEl.textContent   = 'SCORE: ' + score;
        classifiedEl.textContent = classified;
        precisionEl.textContent  = Math.floor(80 + Math.random()*15) + '%';
        updateEvidence();
        break;
      }
    }
  }

  // Spawn anomalies periodically
  anomalyTimer++;
  if (anomalyTimer > 280) { spawnAnomaly(); anomalyTimer = 0; }

  // Cluster proximity info panel
  let nearest = null, nearestDist = Infinity;
  planetMeshes.forEach(m => {
    const d = camera.position.distanceTo(m.position);
    if (d < nearestDist) { nearestDist = d; nearest = m; }
  });

  if (nearest && nearestDist < 28) {
    const c = nearest.userData.cluster;
    if (closestCluster !== c.label) {
      closestCluster = c.label;
      panelNameEl.textContent  = '🪐 ' + c.label;
      panelStatsEl.textContent = c.desc + ' · ' + c.treffer + ' Treffer · Relevanz ' + Math.floor(c.relevanz*100) + '%';
    }
    infoPanelEl.style.opacity = Math.max(0, 1 - nearestDist/28);
  } else {
    infoPanelEl.style.opacity = 0;
    closestCluster = null;
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
// First anomaly after 3s
setTimeout(spawnAnomaly, 3000);
</script>
</body>
</html>
