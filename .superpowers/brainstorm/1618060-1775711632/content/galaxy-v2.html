<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Cluster Explorer v2 — FULL ACTION</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#000;overflow:hidden;font-family:'Courier New',monospace;cursor:none; }
canvas { display:block; }

#hud { position:fixed;top:0;left:0;right:0;pointer-events:none;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start; }
#hud-left { color:#6366f1;font-size:11px;line-height:2;text-shadow:0 0 8px #6366f1; }
#hud-right { color:#06b6d4;font-size:11px;line-height:2;text-align:right;text-shadow:0 0 8px #06b6d4; }
#hud-title { font-size:15px;font-weight:bold;color:#a5b4fc;letter-spacing:3px;text-shadow:0 0 12px #6366f1; }
#score { font-size:20px;font-weight:bold;color:#f59e0b;text-shadow:0 0 12px #f59e0b;transition:transform 0.1s; }
#score.pop { transform:scale(1.3); }
#combo { font-size:13px;color:#f59e0b;text-shadow:0 0 8px #f59e0b;transition:opacity 0.3s; }

#crosshair { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;width:24px;height:24px; }
#crosshair::before,#crosshair::after { content:'';position:absolute;background:rgba(6,182,212,0.9); }
#crosshair::before { width:2px;height:100%;left:50%;transform:translateX(-50%); }
#crosshair::after  { height:2px;width:100%;top:50%;transform:translateY(-50%); }
#crosshair-dot { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:#06b6d4;border-radius:50%;pointer-events:none;box-shadow:0 0 6px #06b6d4; }

#info-panel { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(10,10,30,0.9);border:1px solid #6366f1;border-radius:8px;padding:10px 20px;color:#a5b4fc;font-size:11px;text-align:center;pointer-events:none;transition:opacity 0.3s;max-width:420px;box-shadow:0 0 20px rgba(99,102,241,0.4); }
.cluster-name { font-size:13px;color:#e0e7ff;font-weight:bold;margin-bottom:3px; }
.cluster-stats { color:#818cf8; }

#controls-hint { position:fixed;bottom:20px;right:20px;color:rgba(99,102,241,0.45);font-size:10px;line-height:2;text-align:right;pointer-events:none; }

#wave-banner { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;color:#f59e0b;text-shadow:0 0 30px #f59e0b,0 0 60px #f59e0b;letter-spacing:6px;pointer-events:none;opacity:0;transition:opacity 0.3s; }

#health-bar { position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;pointer-events:none; }
#health-label { color:#ef4444;font-size:10px;text-shadow:0 0 6px #ef4444; }
#health-fill { height:6px;width:200px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);border-radius:3px;overflow:hidden; }
#health-inner { height:100%;background:#ef4444;width:100%;transition:width 0.3s;box-shadow:0 0 8px #ef4444; }

#flash { position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 0.08s; }
#boss-alert { position:fixed;top:30%;left:50%;transform:translateX(-50%);color:#ef4444;font-size:18px;font-weight:bold;letter-spacing:4px;text-shadow:0 0 20px #ef4444;pointer-events:none;opacity:0;transition:opacity 0.3s; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-left">
    <div id="hud-title">CLUSTER EXPLORER</div>
    <div>WAVE: <span id="wave-num">1</span></div>
    <div>CLUSTER: <span id="cluster-count">7</span></div>
    <div style="color:#ef4444;text-shadow:0 0 8px #ef4444">FEINDE: <span id="enemy-count">0</span></div>
    <div style="color:#10b981;text-shadow:0 0 8px #10b981">KILLS: <span id="kills">0</span></div>
  </div>
  <div id="hud-right">
    <div id="score">0</div>
    <div id="combo" style="opacity:0">COMBO ×<span id="combo-num">1</span></div>
    <div>PRÄZISION: <span id="precision">—</span></div>
    <div style="margin-top:4px;color:#10b981;text-shadow:0 0 8px #10b981">EVIDENZ: <span id="evidence">░░░░░░░░░░</span></div>
  </div>
</div>
<div id="crosshair"></div><div id="crosshair-dot"></div>
<div id="info-panel" style="opacity:0"><div class="cluster-name" id="panel-name"></div><div class="cluster-stats" id="panel-stats"></div></div>
<div id="controls-hint">KLICK: Pointer lock + Feuer<br>MAUS: Zielen<br>W/S/A/D: Fliegen<br>LEERTASTE: Feuer<br>SHIFT: Boost</div>
<div id="wave-banner" id="wave-banner">WAVE 1</div>
<div id="health-bar"><span id="health-label">SCHILD</span><div id="health-fill"><div id="health-inner"></div></div></div>
<div id="flash"></div>
<div id="boss-alert"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── SCENE ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000008, 0.003);
const camera = new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,1200);
camera.position.set(0,15,90);

// ── STATE ──────────────────────────────────────────────────────────────
let score=0,kills=0,combo=1,comboTimer=0,shots=0,hits=0;
let health=100, wave=1, waveKills=0, waveTarget=8;
let gameOver=false;
const scoreEl=document.getElementById('score');
const killsEl=document.getElementById('kills');
const comboEl=document.getElementById('combo');
const comboNumEl=document.getElementById('combo-num');
const precisionEl=document.getElementById('precision');
const evidenceEl=document.getElementById('evidence');
const enemyCountEl=document.getElementById('enemy-count');
const waveNumEl=document.getElementById('wave-num');
const healthInner=document.getElementById('health-inner');
const flashEl=document.getElementById('flash');
const bossAlertEl=document.getElementById('boss-alert');
const waveBanner=document.getElementById('wave-banner');

// ── CLUSTERS ───────────────────────────────────────────────────────────
const clusters = [
  {label:'Intervention',  desc:'Therapeutische Maßnahmen',    treffer:142,relevanz:0.92,pos:[0,0,0],      color:0x6366f1,size:8},
  {label:'Population',    desc:'Zielgruppen & Stichproben',   treffer:89, relevanz:0.78,pos:[38,8,-22],   color:0x10b981,size:6},
  {label:'Outcome',       desc:'Primäre Endpunkte',           treffer:115,relevanz:0.85,pos:[-32,5,18],   color:0x06b6d4,size:7},
  {label:'Studiendesign', desc:'RCT, Kohorten, Case-Control', treffer:67, relevanz:0.65,pos:[22,-15,38],  color:0xf59e0b,size:5},
  {label:'Bias & Qualität',desc:'RoB2, CASP Bewertungen',    treffer:43, relevanz:0.71,pos:[-48,-10,-32], color:0xec4899,size:4},
  {label:'Comparator',    desc:'Kontrollgruppen & Vergleich', treffer:38, relevanz:0.60,pos:[52,20,12],   color:0xa78bfa,size:4},
  {label:'Setting',       desc:'Klinische Umgebungen',        treffer:29, relevanz:0.55,pos:[-18,28,-52], color:0xfb923c,size:3.5},
];

// ── STARS ──────────────────────────────────────────────────────────────
const starGeo=new THREE.BufferGeometry();
const sv=[];for(let i=0;i<6000;i++)sv.push((Math.random()-.5)*1200,(Math.random()-.5)*1200,(Math.random()-.5)*1200);
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.35,transparent:true,opacity:0.75})));

// Colored nebula dusts
[[0x4338ca,.12],[0x0e7490,.08],[0x7c3aed,.06]].forEach(([col,op])=>{
  const g=new THREE.BufferGeometry(),v=[];
  for(let i=0;i<600;i++){const r=80+Math.random()*150,a=Math.random()*Math.PI*2;v.push(r*Math.cos(a),(Math.random()-.5)*60,r*Math.sin(a));}
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:col,size:2,transparent:true,opacity:op})));
});

// ── PLANETS ────────────────────────────────────────────────────────────
const planetMeshes=[],glowMeshes=[];
clusters.forEach((c,i)=>{
  const m=new THREE.Mesh(new THREE.SphereGeometry(c.size,32,32),
    new THREE.MeshPhongMaterial({color:c.color,emissive:c.color,emissiveIntensity:.25,shininess:90}));
  m.position.set(...c.pos);m.userData={cluster:c,index:i};
  scene.add(m);planetMeshes.push(m);
  const g=new THREE.Mesh(new THREE.SphereGeometry(c.size*1.7,16,16),
    new THREE.MeshBasicMaterial({color:c.color,transparent:true,opacity:.05,side:THREE.BackSide}));
  g.position.set(...c.pos);scene.add(g);glowMeshes.push(g);
  if(c.treffer>70){
    const ring=new THREE.Mesh(new THREE.RingGeometry(c.size*1.9,c.size*2.1,64),
      new THREE.MeshBasicMaterial({color:c.color,transparent:true,opacity:.15,side:THREE.DoubleSide}));
    ring.position.set(...c.pos);ring.rotation.x=Math.PI/2+(Math.random()-.5)*.6;scene.add(ring);
  }
  const pl=new THREE.PointLight(c.color,.7,c.size*14);pl.position.set(...c.pos);scene.add(pl);
});
scene.add(new THREE.AmbientLight(0x111133,.9));
const sun=new THREE.DirectionalLight(0xffffff,.5);sun.position.set(60,80,40);scene.add(sun);

// ── ENEMIES ────────────────────────────────────────────────────────────
const enemies=[];

function spawnEnemy(type='anomaly',forced_pos=null){
  let geo,mat,speed,hp,pts,size;
  if(type==='anomaly'){
    geo=new THREE.OctahedronGeometry(1.4,0);
    mat=new THREE.MeshPhongMaterial({color:0xef4444,emissive:0xef4444,emissiveIntensity:.8});
    speed=0.04+Math.random()*.04+wave*.015; hp=1; pts=100; size=1.4;
  } else if(type==='collision'){
    geo=new THREE.TetrahedronGeometry(2,0);
    mat=new THREE.MeshPhongMaterial({color:0xf97316,emissive:0xf97316,emissiveIntensity:.6});
    speed=0.08+wave*.02; hp=2; pts=250; size=2;
  } else if(type==='dark'){
    geo=new THREE.BoxGeometry(1.6,1.6,1.6);
    mat=new THREE.MeshPhongMaterial({color:0x8b5cf6,emissive:0x8b5cf6,emissiveIntensity:.5,wireframe:false});
    speed=0.12+wave*.02; hp=3; pts=400; size=1.6;
  } else if(type==='boss'){
    geo=new THREE.IcosahedronGeometry(5,1);
    mat=new THREE.MeshPhongMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:.4,wireframe:true});
    speed=0.05; hp=20; pts=2000; size=5;
  }
  const mesh=new THREE.Mesh(geo,mat);
  if(forced_pos) mesh.position.set(...forced_pos);
  else {
    const r=80+Math.random()*60,a=Math.random()*Math.PI*2,b=(Math.random()-.5)*Math.PI*.5;
    mesh.position.set(camera.position.x+r*Math.cos(a)*Math.cos(b),camera.position.y+r*Math.sin(b),camera.position.z+r*Math.sin(a)*Math.cos(b));
  }
  mesh.userData={type,speed,hp,maxHp:hp,pts,size,spinX:Math.random()*.06,spinY:Math.random()*.08,teleportTimer:type==='dark'?120:Infinity};
  scene.add(mesh);enemies.push(mesh);
  enemyCountEl.textContent=enemies.length;
}

// ── PARTICLES / EXPLOSIONS ─────────────────────────────────────────────
const particles=[];
function explode(pos,color=0xef4444,count=28,big=false){
  for(let i=0;i<count;i++){
    const g=new THREE.SphereGeometry(big?.3:.15,4,4);
    const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
    const p=new THREE.Mesh(g,m);
    p.position.copy(pos);
    const dir=new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*2,(Math.random()-.5)*2).normalize();
    const spd=big?(Math.random()*1.8+.5):(Math.random()*1.2+.2);
    p.userData={vel:dir.multiplyScalar(spd),life:1,decay:big?.012:.018};
    scene.add(p);particles.push(p);
  }
  // Ring shockwave
  const ringG=new THREE.RingGeometry(.1,big?3:1.5,24);
  const ringM=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.8,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(ringG,ringM);
  ring.position.copy(pos);ring.lookAt(camera.position);
  ring.userData={vel:new THREE.Vector3(0,0,0),life:1,decay:.06,ring:true,scale:big?1.6:.8};
  scene.add(ring);particles.push(ring);
}

function flashScreen(color='rgba(239,68,68,0.25)'){
  flashEl.style.background=color;flashEl.style.opacity='1';
  setTimeout(()=>flashEl.style.opacity='0',80);
}

// ── LASERS ─────────────────────────────────────────────────────────────
const lasers=[];
let autoFireTimer=0,autoFiring=false;

function fireLaser(count=1){
  for(let k=0;k<count;k++){
    shots++;
    const g=new THREE.CylinderGeometry(.04,.04,5,5);g.rotateX(Math.PI/2);
    const m=new THREE.MeshBasicMaterial({color:0x00ffff});
    const l=new THREE.Mesh(g,m);
    l.position.copy(camera.position);
    const dir=new THREE.Vector3();camera.getWorldDirection(dir);
    if(count>1){dir.x+=(Math.random()-.5)*.05;dir.y+=(Math.random()-.5)*.05;dir.normalize();}
    l.userData={dir,speed:4.5,life:90};
    l.lookAt(l.position.clone().add(dir));
    scene.add(l);lasers.push(l);
  }
}

// ── CONTROLS ───────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();fireLaser();}});
document.addEventListener('keyup',e=>keys[e.code]=false);
let mouseX=0,mouseY=0,locked=false;
canvas.addEventListener('click',()=>{if(!locked)canvas.requestPointerLock();else fireLaser();});
document.addEventListener('pointerlockchange',()=>locked=document.pointerLockElement===canvas);
document.addEventListener('mousemove',e=>{if(locked){mouseX-=e.movementX*.0022;mouseY-=e.movementY*.0022;mouseY=Math.max(-1.3,Math.min(1.3,mouseY));}});

// ── WAVE SYSTEM ────────────────────────────────────────────────────────
function showWaveBanner(txt){
  waveBanner.textContent=txt;waveBanner.style.opacity='1';
  setTimeout(()=>waveBanner.style.opacity='0',2200);
}
function startWave(n){
  wave=n;waveKills=0;waveTarget=6+n*4;
  waveNumEl.textContent=n;
  showWaveBanner('— WAVE '+n+' —');
  // Spawn initial enemies
  const count=Math.min(3+n,10);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const t=Math.random()<.15&&n>2?'boss':Math.random()<.3?'dark':Math.random()<.5?'collision':'anomaly';
      spawnEnemy(t);
    },i*400);
  }
  if(n>2){
    bossAlertEl.textContent='⚠ KOLLISIONSEREIGNIS ERKANNT ⚠';
    bossAlertEl.style.opacity='1';
    setTimeout(()=>bossAlertEl.style.opacity='0',2500);
  }
}

// ── INFO PANEL ─────────────────────────────────────────────────────────
const infoPanelEl=document.getElementById('info-panel');
const panelNameEl=document.getElementById('panel-name');
const panelStatsEl=document.getElementById('panel-stats');
let closestCluster=null;

function updateEvidence(){
  const bars=Math.min(10,Math.floor(kills/3));
  evidenceEl.textContent='▓'.repeat(bars)+'░'.repeat(10-bars);
  evidenceEl.style.color=bars>6?'#10b981':bars>3?'#f59e0b':'#ef4444';
}
function addScore(pts,pos){
  const gained=pts*combo;score+=gained;
  scoreEl.textContent=score.toLocaleString();
  scoreEl.classList.add('pop');setTimeout(()=>scoreEl.classList.remove('pop'),120);
}
function bumpCombo(){
  combo=Math.min(combo+1,8);comboTimer=120;
  comboNumEl.textContent=combo;comboEl.style.opacity='1';
}
function takeDamage(amt){
  health=Math.max(0,health-amt);
  healthInner.style.width=health+'%';
  flashScreen('rgba(239,68,68,0.35)');
  if(health<=0&&!gameOver){gameOver=true;setTimeout(()=>alert('GAME OVER — Score: '+score.toLocaleString()),300);}
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────
let t=0,spawnTimer=0,spawnInterval=160;
startWave(1);

function animate(){
  requestAnimationFrame(animate);
  if(gameOver)return;
  t+=.008;

  // Camera
  camera.rotation.order='YXZ';
  camera.rotation.y=mouseX;camera.rotation.x=mouseY;
  const fwd=new THREE.Vector3(),rgt=new THREE.Vector3();
  camera.getWorldDirection(fwd);rgt.crossVectors(fwd,camera.up).normalize();
  const spd=keys['ShiftLeft']||keys['ShiftRight']?1.4:.7;
  if(keys['KeyW'])camera.position.addScaledVector(fwd,spd);
  if(keys['KeyS'])camera.position.addScaledVector(fwd,-spd);
  if(keys['KeyA'])camera.position.addScaledVector(rgt,-spd);
  if(keys['KeyD'])camera.position.addScaledVector(rgt,spd);
  if(keys['KeyQ'])camera.position.y+=spd*.5;
  if(keys['KeyE'])camera.position.y-=spd*.5;

  // Auto-fire while holding space
  if(keys['Space']){autoFireTimer++;if(autoFireTimer%8===0)fireLaser();}else{autoFireTimer=0;}

  // Planet animations
  planetMeshes.forEach((m,i)=>{m.rotation.y+=.003;glowMeshes[i].material.opacity=.04+.025*Math.sin(t*1.5+i);});

  // Spawn timer
  spawnTimer++;
  spawnInterval=Math.max(50,160-wave*15);
  if(spawnTimer>spawnInterval){
    spawnTimer=0;
    const type=Math.random()<.2?'dark':Math.random()<.35?'collision':'anomaly';
    spawnEnemy(type);
    if(enemies.length>4&&Math.random()<.3)spawnEnemy('anomaly');
  }

  // Enemy update
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.rotation.x+=e.userData.spinX;e.rotation.y+=e.userData.spinY;
    // Move toward player
    const toPlayer=new THREE.Vector3().subVectors(camera.position,e.position).normalize();
    e.position.addScaledVector(toPlayer,e.userData.speed);
    // Pulse glow
    if(e.userData.type==='anomaly')e.material.emissiveIntensity=.5+.5*Math.abs(Math.sin(t*5+i));
    if(e.userData.type==='dark'){e.userData.teleportTimer--;if(e.userData.teleportTimer<=0){const r=50+Math.random()*30,a=Math.random()*Math.PI*2;e.position.set(camera.position.x+r*Math.cos(a),camera.position.y+(Math.random()-.5)*30,camera.position.z+r*Math.sin(a));e.userData.teleportTimer=80+Math.random()*60;flashScreen('rgba(139,92,246,0.2)');}}
    // Hit player
    if(e.position.distanceTo(camera.position)<(e.userData.size+2)){
      const dmg=e.userData.type==='boss'?15:e.userData.type==='dark'?8:e.userData.type==='collision'?5:3;
      takeDamage(dmg);explode(e.position,e.material.color.getHex(),8);
      scene.remove(e);enemies.splice(i,1);enemyCountEl.textContent=enemies.length;
      combo=1;comboEl.style.opacity='0';
    }
  }

  // Laser update
  for(let i=lasers.length-1;i>=0;i--){
    const l=lasers[i];
    l.position.addScaledVector(l.userData.dir,l.userData.speed);
    l.userData.life--;
    if(l.userData.life<=0){scene.remove(l);lasers.splice(i,1);continue;}
    let laserRemoved=false;
    for(let j=enemies.length-1;j>=0;j--){
      if(laserRemoved)break;
      if(l.position.distanceTo(enemies[j].position)<(enemies[j].userData.size+1.5)){
        hits++;
        const e=enemies[j];
        e.userData.hp--;
        if(e.userData.hp<=0){
          const big=e.userData.type==='boss';
          explode(e.position,e.material.color.getHex(),big?50:22,big);
          if(big)flashScreen('rgba(255,0,0,0.4)');
          else flashScreen('rgba(6,182,212,0.15)');
          addScore(e.userData.pts,e.position);
          kills++;waveKills++;
          killsEl.textContent=kills;
          bumpCombo();
          if(shots>0)precisionEl.textContent=Math.round(hits/shots*100)+'%';
          updateEvidence();
          // Boss spawns babies
          if(e.userData.type==='boss'){for(let b=0;b<4;b++)spawnEnemy('anomaly');}
          scene.remove(e);enemies.splice(j,1);enemyCountEl.textContent=enemies.length;
          // Wave complete?
          if(waveKills>=waveTarget){setTimeout(()=>startWave(wave+1),2000);}
        } else {
          // Hit flash on enemy
          e.material.emissiveIntensity=2;setTimeout(()=>e.material.emissiveIntensity=.7,100);
          explode(l.position,0x00ffff,6);
        }
        scene.remove(l);lasers.splice(i,1);laserRemoved=true;
      }
    }
  }

  // Combo decay
  if(comboTimer>0){comboTimer--;if(comboTimer===0){combo=1;comboEl.style.opacity='0';}}

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.userData.life-=p.userData.decay;
    if(p.userData.life<=0){scene.remove(p);particles.splice(i,1);continue;}
    p.material.opacity=p.userData.life;
    if(p.userData.ring){p.scale.setScalar(1+(1-p.userData.life)*p.userData.scale*8);}
    else{p.position.addScaledVector(p.userData.vel,1);p.userData.vel.multiplyScalar(.94);}
  }

  // Cluster proximity
  let near=null,nearD=Infinity;
  planetMeshes.forEach(m=>{const d=camera.position.distanceTo(m.position);if(d<nearD){nearD=d;near=m;}});
  if(near&&nearD<30){
    const c=near.userData.cluster;
    if(closestCluster!==c.label){closestCluster=c.label;panelNameEl.textContent='🪐 '+c.label;panelStatsEl.textContent=c.desc+' · '+c.treffer+' Treffer · Relevanz '+Math.floor(c.relevanz*100)+'%';}
    infoPanelEl.style.opacity=Math.max(0,1-nearD/30).toFixed(2);
  } else {infoPanelEl.style.opacity='0';closestCluster=null;}

  renderer.render(scene,camera);
}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
animate();
</script>
